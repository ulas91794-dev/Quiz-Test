<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>İnteraktif Tarih Bilgi Yarışması</title>
    <style>
        /* --- Temel ve Modern Renk Paleti (Dark Mode) --- */
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-color: #f8fafc;
            --text-secondary: #94a3b8;
            --accent-color: #38bdf8;
            --correct-color: #10b981;
            --wrong-color: #ef4444;
            --btn-hover: #334155;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            -webkit-tap-highlight-color: transparent; /* Mobil tıklama efektini temizler */
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        /* --- Kart Yapısı --- */
        .quiz-container {
            background-color: var(--card-bg);
            width: 100%;
            max-width: 500px;
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
            border: 1px solid #334155;
            text-align: center;
        }

        /* --- Soru Sayacı ve Soru Metni --- */
        .quiz-header {
            margin-bottom: 20px;
        }

        #progress {
            font-size: 0.9rem;
            color: var(--text-secondary);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        #question-text {
            font-size: 1.3rem;
            font-weight: 600;
            line-height: 1.5;
        }

        /* --- Şık Butonları --- */
        .options-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 20px;
        }

        .option-btn {
            background-color: transparent;
            color: var(--text-color);
            border: 2px solid #475569;
            padding: 14px 20px;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            text-align: left;
            transition: all 0.25s ease;
            width: 100%;
            word-wrap: break-word; /* Yazıların taşmasını önler */
        }

        /* Masaüstünde hover, mobilde aktif dokunma efekti */
        @media (hover: hover) {
            .option-btn:hover:not([disabled]) {
                background-color: var(--btn-hover);
                border-color: var(--accent-color);
                transform: translateY(-2px);
            }
        }
        
        .option-btn:active:not([disabled]) {
            transform: scale(0.98);
        }

        /* --- Doğru/Yanlış ve Kilitleme Durumları --- */
        .option-btn.correct {
            background-color: var(--correct-color) !important;
            border-color: var(--correct-color) !important;
            color: #ffffff;
        }

        .option-btn.wrong {
            background-color: var(--wrong-color) !important;
            border-color: var(--wrong-color) !important;
            color: #ffffff;
        }

        .option-btn:disabled {
            cursor: not-allowed;
            opacity: 0.7;
        }
        
        .option-btn.correct:disabled, .option-btn.wrong:disabled {
            opacity: 1; /* Seçilen veya doğru olan şıkların soluklaşmasını engeller */
        }

        /* --- Kontrol Butonları (Sonraki / Yeniden Başla) --- */
        .action-btn {
            background-color: var(--accent-color);
            color: #0f172a;
            border: none;
            padding: 14px;
            border-radius: 10px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            margin-top: 24px;
            transition: background-color 0.2s, transform 0.1s;
            display: none; /* Başlangıçta gizli */
        }

        .action-btn:active {
            transform: scale(0.98);
        }

        /* --- Sonuç Ekranı --- */
        .result-screen {
            display: none;
        }

        .result-screen h2 {
            font-size: 2rem;
            color: var(--accent-color);
            margin-bottom: 12px;
        }

        .score-text {
            font-size: 1.2rem;
            margin-bottom: 20px;
            color: var(--text-secondary);
        }
    </style>
</head>
<body>

    <div class="quiz-container">
        <!-- Yarışma Alanı -->
        <div id="quiz-box">
            <div class="quiz-header">
                <div id="progress">Soru 1 / 3</div>
                <div id="question-text">Soru yükleniyor...</div>
            </div>
            <div class="options-container" id="options-box">
                <!-- Butonlar JavaScript ile buraya gelecek -->
            </div>
            <button id="next-btn" class="action-btn" onclick="nextQuestion()">Sonraki Soru</button>
        </div>

        <!-- Sonuç Alanı -->
        <div id="result-box" class="result-screen">
            <h2>Tebrikler!</h2>
            <p class="score-text" id="score-report">Yarışmayı tamamladınız.</p>
            <button class="action-btn" style="display: block;" onclick="restartQuiz()">Yeniden Başla</button>
        </div>
    </div>

    <script>
        // --- Soru Havuzu ---
        const questions = [
            {
                question: "Cumhuriyetimizin kurucusu Mustafa Kemal Atatürk'ün nüfusa kayıtlı olduğu il hangisidir?",
                options: ["İstanbul", "Ankara", "Gaziantep", "Selanik"],
                answer: "Gaziantep"
            },
            {
                question: "Kurtuluş Savaşı'nı resmen bitiren ve Türkiye Cumhuriyeti'nin tapu senedi olarak kabul edilen antlaşma hangisidir?",
                options: ["Mondros Mütarekesi", "Lozan Barış Antlaşması", "Ankara Antlaşması", "Gümrü Antlaşması"],
                answer: "Lozan Barış Antlaşması"
            },
            {
                question: "Tarihte 'Türk' adıyla kurulan ilk devlet hangisidir?",
                options: ["Göktürk Devleti", "Hun İmparatorluğu", "Uygur Devleti", "Osmanlı İmparatorluğu"],
                answer: "Göktürk Devleti"
            }
        ];

        let currentQuestionIndex = 0;
        let score = 0;

        // --- Elementleri Seçme ---
        const questionTextElement = document.getElementById("question-text");
        const optionsBoxElement = document.getElementById("options-box");
        const progressElement = document.getElementById("progress");
        const nextButtonElement = document.getElementById("next-btn");
        const quizBoxElement = document.getElementById("quiz-box");
        const resultBoxElement = document.getElementById("result-box");
        const scoreReportElement = document.getElementById("score-report");

        // --- Yarışmayı Başlatma ---
        function startQuiz() {
            currentQuestionIndex = 0;
            score = 0;
            quizBoxElement.style.display = "block";
            resultBoxElement.style.display = "none";
            showQuestion();
        }

        // --- Soruyu Ekrana Getirme ---
        function showQuestion() {
            resetState();
            let currentQuestion = questions[currentQuestionIndex];
            
            // İlerleme durumunu güncelle
            progressElement.innerText = `Soru ${currentQuestionIndex + 1} / ${questions.length}`;
            // Soru metnini yazdır
            questionTextElement.innerText = currentQuestion.question;

            // Şıkları temizle ve yeniden oluştur
            currentQuestion.options.forEach(option => {
                const button = document.createElement("button");
                button.innerText = option;
                button.classList.add("option-btn");
                button.addEventListener("click", () => selectOption(button, currentQuestion.answer));
                optionsBoxElement.appendChild(button);
            });
        }

        // --- Her Sorudan Önce Temizlik ---
        function resetState() {
            nextButtonElement.style.display = "none";
            while (optionsBoxElement.firstChild) {
                optionsBoxElement.removeChild(optionsBoxElement.firstChild);
            }
        }

        // --- Şık Seçildiğinde Çalışacak Fonksiyon ---
        function selectOption(selectedButton, correctAnswer) {
            const isCorrect = selectedButton.innerText === correctAnswer;
            
            if (isCorrect) {
                selectedButton.classList.add("correct");
                score++;
            } else {
                selectedButton.classList.add("wrong");
                // Yanlış seçildiyse doğru olanı da yeşil yap
                Array.from(optionsBoxElement.children).forEach(button => {
                    if (button.innerText === correctAnswer) {
                        button.classList.add("correct");
                    }
                });
            }

            // Tüm butonları kilitle (tıklanamaz yap)
            Array.from(optionsBoxElement.children).forEach(button => {
                button.disabled = true;
            });

            // Sonraki Soru butonunu göster
            nextButtonElement.style.display = "block";
        }

        // --- Sonraki Soruya Geçiş ---
        function nextQuestion() {
            currentQuestionIndex++;
            if (currentQuestionIndex < questions.length) {
                showQuestion();
            } else {
                showResult();
            }
        }

        // --- Sonuç Ekranı ---
        function showResult() {
            quizBoxElement.style.display = "none";
            resultBoxElement.style.display = "block";
            scoreReportElement.innerText = `${questions.length} sorudan ${score} doğru cevap verdiniz.`;
        }

        // --- Yeniden Başlatma ---
        function restartQuiz() {
            startQuiz();
        }

        // Sayfa ilk açıldığında yarışmayı başlat
        startQuiz();
    </script>
</body>
</html>
