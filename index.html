<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kim Milyoner Olmak İster? - Tarih Özel</title>
    <style>
        :root {
            --bg-color: #020617;
            --card-bg: #0f172a;
            --text-color: #f8fafc;
            --text-secondary: #38bdf8;
            --correct-color: #22c55e;
            --wrong-color: #ef4444;
            --gold: #eab308;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 15px;
        }

        .quiz-container {
            background-color: var(--card-bg);
            width: 100%;
            max-width: 550px;
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 0 30px rgba(56, 189, 248, 0.15);
            border: 2px solid #1e293b;
            text-align: center;
        }

        /* --- Spiker ve Atmosfer Alanı --- */
        .speaker-box {
            background: rgba(30, 41, 59, 0.7);
            border-left: 4px solid var(--gold);
            padding: 12px;
            border-radius: 8px;
            font-style: italic;
            font-size: 0.95rem;
            color: #cbd5e1;
            margin-bottom: 20px;
            min-height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #money-prize {
            font-size: 1.2rem;
            font-weight: bold;
            color: var(--gold);
            margin-bottom: 10px;
            text-shadow: 0 0 10px rgba(234, 179, 8, 0.3);
        }

        #question-text {
            font-size: 1.25rem;
            font-weight: 600;
            line-height: 1.4;
            margin-bottom: 25px;
            min-height: 70px;
        }

        /* --- Şıklar (Milyoner Tarzı) --- */
        .options-container {
            display: grid;
            grid-template-columns: 1fr;
            gap: 14px;
        }

        @media (min-width: 480px) {
            .options-container {
                grid-template-columns: 1fr 1fr; /* Yatayda ikili dizilim */
            }
        }

        .option-btn {
            background-color: #1e293b;
            color: var(--text-color);
            border: 1.5px solid #334155;
            padding: 16px;
            border-radius: 30px; /* Klasik milyoner butonu yapısı */
            font-size: 0.95rem;
            font-weight: 500;
            cursor: pointer;
            text-align: left;
            transition: all 0.2s ease;
            width: 100%;
        }

        .option-btn:hover:not([disabled]) {
            border-color: var(--gold);
            background-color: #334155;
        }

        /* Doğru / Yanlış / Kilitleme */
        .option-btn.correct {
            background-color: var(--correct-color) !important;
            border-color: var(--correct-color) !important;
            animation: pulse 0.5s ease;
        }

        .option-btn.wrong {
            background-color: var(--wrong-color) !important;
            border-color: var(--wrong-color) !important;
        }

        /* --- Alt Butonlar --- */
        .action-btn {
            background-color: var(--gold);
            color: #000;
            border: none;
            padding: 14px;
            border-radius: 30px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            margin-top: 25px;
            display: none;
            box-shadow: 0 4px 15px rgba(234, 179, 8, 0.4);
        }

        /* --- Sonuç Ekranı ve Miim Alanı --- */
        .result-screen {
            display: none;
        }

        .meme-container {
            margin: 20px auto;
            width: 100%;
            max-width: 300px;
            height: 200px;
            border-radius: 12px;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #1e293b;
        }

        .meme-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.03); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body>

    <div class="quiz-container">
        <div id="quiz-box">
            <div id="money-prize">Ödül: 0 TL</div>
            <div class="speaker-box" id="speaker-text">"Stüdyomuza hoş geldiniz! İlk soru geliyor, derin bir nefes alın..."</div>
            <div id="question-text">Soru yükleniyor...</div>
            
            <div class="options-container" id="options-box"></div>
            <button id="next-btn" class="action-btn" onclick="nextQuestion()">Sonraki Soruya Geç</button>
        </div>

        <div id="result-box" class="result-screen">
            <h2 id="result-title" style="color: var(--gold); font-size: 1.8rem; margin-bottom: 10px;">Yarışma Bitti!</h2>
            <p id="score-report" style="font-size: 1.2rem; margin-bottom: 15px;"></p>
            
            <div class="meme-container">
                <img id="meme-display" class="meme-img" src="" alt="Meme">
            </div>

            <button class="action-btn" style="display: block;" onclick="restartQuiz()">Yeniden Yarış</button>
        </div>
    </div>

    <audio id="snd-applause" src="https://assets.mixkit.co/active_storage/sfx/2324/2324-84.wav" preload="auto"></audio>
    <audio id="snd-wrong" src="https://assets.mixkit.co/active_storage/sfx/2552/2552-84.wav" preload="auto"></audio>
    <audio id="mus-happy" src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" preload="auto" loop></audio>

    <script>
        const questions = [
            {
                question: "A) Mustafa Kemal, B) Kemal Mustafa... Şaka bir yana; Atatürk'ün kurduğu ve ilk genel başkanı olduğu siyasi parti hangisidir?",
                options: ["A: Terakkiperver Cumhuriyet Fırkası", "B: Cumhuriyet Halk Fırkası", "C: Serbest Cumhuriyet Fırkası", "D: Demokrat Parti"],
                answer: "B: Cumhuriyet Halk Fırkası",
                prize: "50.000 TL",
                speakerIntro: "Evet, baraj sorusundayız. Dikkatli düşünün, acelemiz yok..."
            },
            {
                question: "Tarihin akışını değiştiren İstanbul'un Fethi (1453) sırasında, Bizans'a yardıma gelen gemilerin Haliç'e girmesini engellemek için çekilen ünlü zincir günümüzde hangi müzede sergilenmektedir?",
                options: ["A: Topkapı Sarayı Müzesi", "B: Harbiye Askeri Müzesi", "C: Ayasofya Müzesi", "D: Yerebatan Sarnıcı"],
                answer: "B: Harbiye Askeri Müzesi",
                prize: "250.000 TL",
                speakerIntro: "Muazzam ilerliyorsunuz! İşte çeyrek milyonluk o soru geliyor..."
            },
            {
                question: "1. Dünya Savaşı'nda Mustafa Kemal Atatürk'ün 'Ben size taarruzu değil, ölmeyi emrediyorum!' diyerek tarihin seyrini değiştirdiği cephe hangisidir?",
                options: ["A: Kafkas Cephesi", "B: Hicaz-Yemen Cephesi", "C: Çanakkale Cephesi", "D: Suriye-Filistin Cephesi"],
                answer: "C: Çanakkale Cephesi",
                prize: "1.000.000 TL",
                speakerIntro: "Ve büyük an geldi! 1 Milyon TL'lik final sorusuyla karşı karşıyasınız. Seyirciler nefesini tuttu!"
            }
        ];

        let currentQuestionIndex = 0;
        let score = 0;

        // Miim Linkleri (Büyük Giphy ID'leri kullanılarak doğrudan entegrasyon)
        const memes = {
            happy: "https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExM3ZpcTcybXg4dDZ0YXp4MXE5N29wM3JpOHZjcHByODN0Z3I3eW96eiZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/YmZOBQMWSvHdC/giphy.gif", // Happy Cat
            gigachad: "https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExMDRid3Znb3M0ZzR3ZXN0YThpNmptN3Z6amN3dzZ2bWpsdjZpbnR0diZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/CAYVZA5NRb529kKQUc/giphy.gif", // GigaChad
            smallbrain: "https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExOHp3ZHcxd3c0dm9mdmxhNDAwZ3V2bm04NHBlNnRmdXpjaXAzOWExdiZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/BBkKEBJ9WD3Ak/giphy.gif" // Homer Simpson / Small Brain
        };

        const speakerSuccessLines = [
            "Muhteşem! Doğru cevap! Stüdyo yıkılıyor, seyirciler ayakta!",
            "İnanılmaz bir soğukkanlılık! Harika bir doğru cevap daha!",
            "Doğru! Doğru! Doğru! Milyoner olma yolunda dev bir adım!"
        ];

        const speakerFailLines = [
            "Ah... Maalesef yanlış şık. Hayallerimize veda ediyoruz...",
            "Hadi ya! Son anda kaybettik. Sağlık olsun diyelim.",
            "Yanlış cevap... Son kararı vermeden önce bir kez daha düşünmeliydik."
        ];

        function startQuiz() {
            currentQuestionIndex = 0;
            score = 0;
            document.getElementById("quiz-box").style.display = "block";
            document.getElementById("result-box").style.display = "none";
            // Sesleri sıfırla
            document.getElementById("mus-happy").pause();
            document.getElementById("mus-happy").currentTime = 0;
            showQuestion();
        }

        function showQuestion() {
            resetState();
            let q = questions[currentQuestionIndex];
            
            document.getElementById("money-prize").innerText = `Hedef Ödül: ${q.prize}`;
            document.getElementById("speaker-text").innerText = `"${q.speakerIntro}"`;
            document.getElementById("question-text").innerText = q.question;

            q.options.forEach(opt => {
                const btn = document.createElement("button");
                btn.innerText = opt;
                btn.classList.add("option-btn");
                btn.addEventListener("click", () => selectOption(btn, q.answer));
                document.getElementById("options-box").appendChild(btn);
            });
        }

        function resetState() {
            document.getElementById("next-btn").style.display = "none";
            const box = document.getElementById("options-box");
            while (box.firstChild) box.removeChild(box.firstChild);
        }

        function selectOption(btn, ans) {
            const isCorrect = btn.innerText === ans;
            const applause = document.getElementById("snd-applause");
            const wrongSnd = document.getElementById("snd-wrong");

            if (isCorrect) {
                btn.classList.add("correct");
                score++;
                applause.play().catch(e => console.log("Ses oynatılamadı."));
                document.getElementById("speaker-text").innerText = `"${speakerSuccessLines[currentQuestionIndex]}"`;
            } else {
                btn.classList.add("wrong");
                wrongSnd.play().catch(e => console.log("Ses oynatılamadı."));
                document.getElementById("speaker-text").innerText = `"${speakerFailLines[Math.floor(Math.random() * 3)]}"`;
                
                // Doğru olanı yeşile boya
                Array.from(document.getElementById("options-box").children).forEach(b => {
                    if (b.innerText === ans) b.classList.add("correct");
                });
            }

            Array.from(document.getElementById("options-box").children).forEach(b => b.disabled = true);
            document.getElementById("next-btn").style.display = "block";
        }

        function nextQuestion() {
            currentQuestionIndex++;
            if (currentQuestionIndex < questions.length) {
                showQuestion();
            } else {
                showResult();
            }
        }

        function showResult() {
            document.getElementById("quiz-box").style.display = "none";
            document.getElementById("result-box").style.display = "block";
            
            const report = document.getElementById("score-report");
            const title = document.getElementById("result-title");
            const img = document.getElementById("meme-display");

            if (score === 3) {
                title.innerText = "Şampiyon Oldun!";
                report.innerText = "3 soruda 3 doğru! 1 Milyon TL kazandın! Happy Happy Happy!";
                img.src = memes.happy;
                // Happy Happy şarkısı arkada çalmaya başlar (Telif hakkı olmayan benzer bir neşeli şarkı tetiklenir)
                document.getElementById("mus-happy").play().catch(e => console.log("Müzik engellendi."));
            } else if (score === 2 || score === 1) {
                title.innerText = "GigaChad Performansı!";
                report.innerText = `${questions.length} sorudan ${score} doğru yaptınız. Fena değil, saygıyı hak ettin.`;
                img.src = memes.gigachad;
            } else {
                title.innerText = "Ah Be Kaptan...";
                report.innerText = "0 Doğru! Beyin hücreleri anlık olarak stüdyoyu terk etti.";
                img.src = memes.smallbrain;
            }
        }

        function restartQuiz() {
            startQuiz();
        }

        // Başlat
        startQuiz();
    </script>
</body>
</html>
