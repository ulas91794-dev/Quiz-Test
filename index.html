<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Milyoner Mobile Pro v6.0</title>
    <style>
        :root {
            --bg-main: #020617;
            --bg-card: #0f172a;
            --text-main: #f8fafc;
            --text-blue: #38bdf8;
            --correct: #10b981;
            --wrong: #ef4444;
            --gold: #eab308;
            --joker: #1e293b;
        }

        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0; 
            font-family: sans-serif;
            user-select: none;
            -webkit-user-select: none;
            -webkit-tap-highlight-color: transparent; 
        }

        body { 
            background-color: var(--bg-main); 
            color: var(--text-main); 
            min-height: 100vh; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            padding: 10px;
        }

        .app-container { 
            background-color: var(--bg-card); 
            width: 100%; 
            max-width: 450px; 
            border-radius: 16px; 
            padding: 15px; 
            border: 2px solid #1e293b; 
            text-align: center;
        }
        
        .status-panel { 
            display: flex; 
            justify-content: space-between; 
            padding: 10px; 
            background: #0f172a; 
            border-radius: 8px; 
            border: 1px solid #334155;
            margin-bottom: 10px;
        }

        .joker-box { display: flex; gap: 8px; margin-bottom: 10px; }
        .joker-btn { flex: 1; background: var(--joker); color: white; border: 2px solid var(--text-blue); padding: 8px; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .joker-btn:disabled { opacity: 0.3; }

        .chat-display { background: #090d16; border: 1px solid #334155; padding: 10px; border-radius: 8px; text-align: left; min-height: 60px; margin-bottom: 10px; }
        .chat-tag { font-weight: bold; font-size: 0.75rem; color: var(--gold); text-transform: uppercase; }
        #chat-dialogue { font-style: italic; font-size: 0.9rem; margin-top: 2px; }

        .q-text { font-size: 1.1rem; font-weight: bold; text-align: left; margin: 15px 0; min-height: 50px; }
        .options-grid { display: grid; grid-template-columns: 1fr; gap: 8px; }
        
        .opt-btn { background: #1e293b; color: white; border: 2px solid #334155; padding: 12px; border-radius: 10px; font-size: 0.95rem; text-align: left; font-weight: 600; cursor: pointer; }
        .opt-btn.correct { background: var(--correct) !important; border-color: #059669 !important; }
        .opt-btn.wrong { background: var(--wrong) !important; border-color: #dc2626 !important; }
        .opt-btn.hidden { opacity: 0.05; pointer-events: none; }

        .main-btn { background: linear-gradient(135deg, var(--gold), #ca8a04); color: black; border: none; padding: 12px; border-radius: 10px; font-size: 1rem; font-weight: bold; cursor: pointer; width: 100%; margin-top: 10px; }

        .view { display: none; }
        .active-view { display: block; }
    </style>
</head>
<body>

    <div class="app-container">
        
        <div id="view-lobby" class="view active-view">
            <h2 style="color: var(--gold); margin-bottom: 15px;">MİLYONER MOBİL</h2>
            <div style="background: #1e293b; padding: 15px; border-radius: 10px; text-align: left; margin-bottom: 15px;">
                <div style="color: #22c55e; font-weight: bold;" id="lobby-money">Cüzdan: 0 TL</div>
                <div style="font-size: 0.85rem; margin-top: 5px; color: #cbd5e1;">Cihaz Durumu: <span style="color: var(--text-blue);">Native APK Hazır</span></div>
            </div>
            <button class="main-btn" onclick="startGame()">YARIŞMAYI BAŞLAT</button>
        </div>

        <div id="view-game" class="view">
            <div class="status-panel">
                <div id="txt-prize" style="color: var(--gold); font-weight: bold;">Soru: 0 TL</div>
                <div id="txt-wallet" style="color: #22c55e; font-weight: bold;">0 TL</div>
            </div>

            <div class="joker-box">
                <button id="j-50" class="joker-btn" onclick="btn5050()">%50</button>
                <button id="j-sey" class="joker-btn" onclick="btnSeyirci()">Seyirci</button>
            </div>

            <div class="chat-display">
                <span class="chat-tag">Spiker Sinyali</span>
                <div id="chat-dialogue">"Sistem stabil, dokunmatik aktif!"</div>
            </div>

            <div id="txt-question" class="q-text">Soru buraya gelecek...</div>
            <div class="options-grid" id="box-options"></div>
            <button id="btn-next" class="main-btn" style="display:none;" onclick="nextStep()">Sonraki Soru</button>
        </div>

    </div>

    <script>
        // İÇİNDE SIFIR HATA BARINDIRAN GÜVENLİ SORU HAVUZU
        const qaBank = [
            { q: "Mısır'da kurulan ilk Türk-İslam devleti hangisidir?", o: ["Tolunoğulları", "İhşidiler", "Eyyubiler", "Memlükler"], a: "Tolunoğulları", v: 50000 },
            { q: "Güneş sistemindeki en sıcak gezegen hangisidir?", o: ["Venüs", "Merkür", "Mars", "Jüpiter"], a: "Venüs", v: 100000 },
            { q: "Fatih Sultan Mehmet'in şiirlerinde kullandığı ünlü mahlas nedir?", o: ["Avni", "Muhibbi", "Adli", "İlhami"], a: "Avni", v: 250000 },
            { q: "Mariana Çukuru hangi okyanus sınırları içerisindedir?", o: ["Büyük Okyanus", "Atlas Okyanusu", "Hint Okyanusu", "Arktik Okyanusu"], a: "Büyük Okyanus", v: 500000 },
            { q: "Aspirinin ham maddesi olan salisilik asit hangi ağaçtan elde edilir?", o: ["Söğüt", "Meşe", "Çam", "Çınar"], a: "Söğüt", v: 1000000 }
        ];

        let wallet = 0;
        let currentQIndex = 0;
        let currentPrize = 0;

        // MOBİL SES MOTORU (Telefonun kendi ses motorunu tetikler)
        function speak(text) {
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel();
                let utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'tr-TR';
                utterance.rate = 1.1;
                window.speechSynthesis.speak(utterance);
            }
        }

        function changeView(viewId) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active-view'));
            document.getElementById(viewId).classList.add('active-view');
        }

        function startGame() {
            currentQIndex = 0;
            currentPrize = 0;
            document.getElementById("j-50").disabled = false;
            document.getElementById("j-sey").disabled = false;
            changeView("view-game");
            loadQuestion();
        }

        function loadQuestion() {
            document.getElementById("btn-next").style.display = "none";
            let grid = document.getElementById("box-options");
            grid.innerHTML = "";

            let data = qaBank[currentQIndex];
            document.getElementById("txt-prize").innerText = `Ödül: ${data.v.toLocaleString()} TL`;
            document.getElementById("txt-wallet").innerText = `Cüzdan: ${wallet.toLocaleString()} TL`;
            document.getElementById("txt-question").innerText = data.q;
            document.getElementById("chat-dialogue").innerText = `"Evet şef, sorun ekranda. Dikkatli odaklan."`;
            
            // Spiker soruyu sesli okur
            speak(data.q);

            // Şıkları Karıştırıp Ekleme
            let shuffled = [...data.o].sort(() => Math.random() - 0.5);
            shuffled.forEach(opt => {
                let btn = document.createElement("button");
                btn.className = "opt-btn";
                btn.innerText = opt;
                btn.onclick = () => selectOpt(btn, data.a, data.v);
                grid.appendChild(btn);
            });
        }

        function selectOpt(selectedBtn, correctAns, value) {
            let buttons = document.querySelectorAll(".opt-btn");
            buttons.forEach(b => b.disabled = true);

            if(selectedBtn.innerText === correctAns) {
                selectedBtn.classList.add("correct");
                currentPrize = value;
                document.getElementById("chat-dialogue").innerText = `"Harika! Doğru cevabı verdin!"`;
                speak("Tebrikler, doğru cevap!");
            } else {
                selectedBtn.classList.add("wrong");
                buttons.forEach(b => {
                    if(b.innerText === correctAns) b.classList.add("correct");
                });
                document.getElementById("chat-dialogue").innerText = `"Maalesef yanlış cevap. Doğru cevap: ${correctAns}"`;
                speak("Maalesef yanlış cevap verdiniz.");
            }
            document.getElementById("btn-next").style.display = "block";
        }

        function nextStep() {
            let isWrong = document.querySelector(".opt-btn.wrong");
            if(isWrong) {
                wallet += currentPrize;
                alert(`Oyun Bitti! Kazancınız: ${currentPrize.toLocaleString()} TL`);
                document.getElementById("lobby-money").innerText = `Cüzdan: ${wallet.toLocaleString()} TL`;
                changeView("view-lobby");
            } else {
                currentQIndex++;
                if(currentQIndex < qaBank.length) {
                    loadQuestion();
                } else {
                    wallet += currentPrize;
                    alert("TEBRİKLER! TÜM SORULARI BİLDİNİZ VE MİLYONER OLDUNUZ!");
                    document.getElementById("lobby-money").innerText = `Cüzdan: ${wallet.toLocaleString()} TL`;
                    changeView("view-lobby");
                }
            }
        }

        function btn5050() {
            document.getElementById("j-50").disabled = true;
            let data = qaBank[currentQIndex];
            let buttons = document.querySelectorAll(".opt-btn");
            let count = 0;
            buttons.forEach(b => {
                if(b.innerText !== data.a && count < 2) {
                    b.classList.add("hidden");
                    count++;
                }
            });
        }

        function btnSeyirci() {
            document.getElementById("j-sey").disabled = true;
            let data = qaBank[currentQIndex];
            document.getElementById("chat-dialogue").innerText = `"Seyircilerimizin %85'i ${data.a} şıkkına güveniyor reis."`;
            speak(`Seyirciye göre doğru cevap büyük ihtimalle ${data.a}`);
        }
    </script>
</body>
</html>
